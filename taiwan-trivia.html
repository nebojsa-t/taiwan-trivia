<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taiwan Trivia — Two Player</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --gold: #D4AF37;
    --deep: #1a0a0f;
    --ink: #2c1a20;
    --cream: #fdf6ec;
    --warm: #f5e6cc;
    --p1: #1e6b8a;
    --p1light: #d0eaf5;
    --p2: #8a3a1e;
    --p2light: #f5ddd0;
    --correct: #2a7d4f;
    --wrong: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,16,46,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(212,175,55,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .game-wrap {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 32px 0 24px;
    position: relative;
  }
  .header-flag {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 12px rgba(200,16,46,0.4));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 6vw, 46px);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .header h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .header-sub {
    margin-top: 6px;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(253,246,236,0.5);
  }

  /* SCOREBOARD */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin: 16px 0 24px;
  }
  .player-card {
    border-radius: 14px;
    padding: 14px 18px;
    position: relative;
    transition: all 0.3s ease;
    border: 2px solid transparent;
  }
  .player-card.p1 {
    background: rgba(30, 107, 138, 0.15);
    border-color: rgba(30, 107, 138, 0.3);
  }
  .player-card.p2 {
    background: rgba(138, 58, 30, 0.15);
    border-color: rgba(138, 58, 30, 0.3);
    text-align: right;
  }
  .player-card.active-turn {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
  }
  .player-card.active-turn .player-name::after {
    content: ' ▶';
    color: var(--gold);
    font-size: 11px;
  }
  .player-name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(253,246,236,0.6);
    margin-bottom: 2px;
  }
  .player-score {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    line-height: 1;
    color: var(--cream);
  }
  .player-card.p1 .player-score { color: #7ec8e3; }
  .player-card.p2 .player-score { color: #e3a07e; }

  .vs-badge {
    text-align: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: rgba(253,246,236,0.25);
  }
  .q-counter {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(253,246,236,0.35);
    text-align: center;
    margin-top: 4px;
  }

  /* PROGRESS BAR */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* QUESTION CARD */
  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px 28px 24px;
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--red), var(--gold), var(--red));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  .turn-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .turn-label.p1 { background: rgba(30,107,138,0.25); color: #7ec8e3; }
  .turn-label.p2 { background: rgba(138,58,30,0.25); color: #e3a07e; }

  .category-tag {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(18px, 3.5vw, 24px);
    line-height: 1.4;
    margin-bottom: 24px;
    color: var(--cream);
  }

  /* OPTIONS */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 520px) {
    .options-grid { grid-template-columns: 1fr; }
  }

  .option-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1.3;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(212,175,55,0.5);
    transform: translateY(-1px);
  }
  .option-letter {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    color: var(--gold);
  }
  .option-btn.correct {
    background: rgba(42,125,79,0.25);
    border-color: #2a7d4f;
    color: #7edba5;
  }
  .option-btn.correct .option-letter { background: #2a7d4f; color: white; }
  .option-btn.wrong {
    background: rgba(192,57,43,0.2);
    border-color: #c0392b;
    color: #f08080;
  }
  .option-btn.wrong .option-letter { background: #c0392b; color: white; }
  .option-btn:disabled { cursor: not-allowed; }

  /* FEEDBACK */
  .feedback-bar {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback-bar.show { display: block; }
  .feedback-bar.correct-fb {
    background: rgba(42,125,79,0.2);
    border: 1px solid rgba(42,125,79,0.4);
    color: #7edba5;
  }
  .feedback-bar.wrong-fb {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.35);
    color: #f08080;
  }
  .feedback-bar strong { font-weight: 600; }
  .feedback-fun { margin-top: 6px; font-size: 13px; opacity: 0.8; color: var(--cream); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* NEXT BTN */
  .next-btn {
    display: none;
    margin-top: 18px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--red), #a00d24);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
  }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,16,46,0.35); }
  .next-btn.show { display: block; animation: fadeIn 0.3s ease; }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* SETUP SCREEN */
  .setup-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
  }
  .setup-box h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    margin-bottom: 6px;
  }
  .setup-box p {
    font-size: 13px;
    color: rgba(253,246,236,0.5);
    margin-bottom: 28px;
  }
  .name-inputs { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }
  .name-input-row { position: relative; }
  .name-input-row label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .name-input-row.p1 label { color: #7ec8e3; }
  .name-input-row.p2 label { color: #e3a07e; }
  .name-input-row input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input-row input:focus { border-color: var(--gold); }
  .name-input-row.p1 input:focus { border-color: #7ec8e3; }
  .name-input-row.p2 input:focus { border-color: #e3a07e; }

  .q-select-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .q-options {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .q-opt {
    padding: 8px 20px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.12);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .q-opt.selected {
    background: rgba(200,16,46,0.2);
    border-color: var(--red);
    color: #f08080;
  }

  .start-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--red), #a00d24);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,16,46,0.4); }

  /* RESULTS SCREEN */
  .results-box {
    text-align: center;
    padding: 20px;
  }
  .results-emoji { font-size: 64px; margin-bottom: 16px; }
  .results-box h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    margin-bottom: 6px;
  }
  .winner-name { color: var(--gold); }
  .results-sub { font-size: 14px; color: rgba(253,246,236,0.5); margin-bottom: 32px; }
  .final-scores {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .final-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 30px;
    min-width: 130px;
  }
  .final-card.winner { border-color: var(--gold); box-shadow: 0 0 30px rgba(212,175,55,0.2); }
  .final-card .fc-name { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.5; margin-bottom: 6px; }
  .final-card .fc-score { font-family: 'DM Serif Display', serif; font-size: 42px; }
  .final-card.p1-card .fc-score { color: #7ec8e3; }
  .final-card.p2-card .fc-score { color: #e3a07e; }
  .results-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .play-again-btn, .new-game-btn {
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .play-again-btn {
    background: linear-gradient(135deg, var(--red), #a00d24);
    border: none;
    color: white;
  }
  .play-again-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(200,16,46,0.35); }
  .new-game-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: var(--cream);
  }
  .new-game-btn:hover { border-color: var(--gold); }

  .decorative-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    opacity: 0.2;
  }
  .decorative-line::before, .decorative-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .decorative-line span { font-size: 18px; }

  /* Bounce anim for score */
  @keyframes scoreBounce {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }
  .score-bump { animation: scoreBounce 0.4s ease; }
</style>
</head>
<body>
<div class="game-wrap">

  <!-- HEADER -->
  <div class="header">
    <span class="header-flag">🇹🇼</span>
    <h1>Discover <em>Taiwan</em></h1>
    <p class="header-sub">A two-player travel trivia</p>
  </div>

  <!-- SETUP SCREEN -->
  <div id="setupScreen" class="screen active">
    <div class="setup-box">
      <h2>Before you fly…</h2>
      <p>Enter your names and choose how many questions to play</p>
      <div class="name-inputs">
        <div class="name-input-row p1">
          <label>Player 1</label>
          <input id="p1name" type="text" placeholder="Your name" maxlength="20">
        </div>
        <div class="name-input-row p2">
          <label>Player 2</label>
          <input id="p2name" type="text" placeholder="Partner's name" maxlength="20">
        </div>
      </div>
      <p class="q-select-label">Number of questions</p>
      <div class="q-options">
        <button class="q-opt" data-val="10">10</button>
        <button class="q-opt selected" data-val="20">20</button>
        <button class="q-opt" data-val="30">30</button>
      </div>
      <button class="start-btn" onclick="startGame()">Start the Quiz 🎯</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <div class="scoreboard">
      <div class="player-card p1" id="p1card">
        <div class="player-name" id="p1label">Player 1</div>
        <div class="player-score" id="p1score">0</div>
      </div>
      <div>
        <div class="vs-badge">VS</div>
        <div class="q-counter" id="qcounter">Q 1 / 20</div>
      </div>
      <div class="player-card p2" id="p2card">
        <div class="player-name" id="p2label">Player 2</div>
        <div class="player-score" id="p2score">0</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="turn-label p1" id="turnLabel">🙋 Player 1's turn</div>
      <div class="category-tag" id="categoryTag">CULTURE</div>
      <div class="question-text" id="questionText">Question loads here</div>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="feedback-bar" id="feedbackBar"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="resultsScreen" class="screen">
    <div class="results-box">
      <div class="results-emoji" id="resultsEmoji">🏆</div>
      <h2 id="resultsTitle">Game Over!</h2>
      <p class="results-sub" id="resultsSub"></p>
      <div class="final-scores">
        <div class="final-card p1-card" id="finalP1Card">
          <div class="fc-name" id="fp1name">P1</div>
          <div class="fc-score" id="fp1score">0</div>
        </div>
        <div class="final-card p2-card" id="finalP2Card">
          <div class="fc-name" id="fp2name">P2</div>
          <div class="fc-score" id="fp2score">0</div>
        </div>
      </div>
      <div class="results-btns">
        <button class="play-again-btn" onclick="playAgain()">Play Again 🔄</button>
        <button class="new-game-btn" onclick="newGame()">New Players</button>
      </div>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  // GEOGRAPHY
  { cat: "Geography", q: "What is the capital city of Taiwan?", opts: ["Kaohsiung","Taichung","Taipei","Tainan"], ans: 2, fun: "Taipei is home to over 2.6 million people and sits in the northern tip of the island." },
  { cat: "Geography", q: "Taiwan is situated in which body of water?", opts: ["South China Sea","Philippine Sea","Taiwan Strait","East China Sea"], ans: 2, fun: "The Taiwan Strait separates Taiwan from mainland China by about 180 km (112 miles)." },
  { cat: "Geography", q: "What is Taiwan's highest mountain?", opts: ["Jade Mountain (Yushan)","Snow Mountain (Xueshan)","Alishan","Hehuanshan"], ans: 0, fun: "Jade Mountain (玉山) stands at 3,952 m — the highest peak in Northeast Asia and all of Taiwan." },
  { cat: "Geography", q: "Which island group administered by Taiwan is closest to mainland China?", opts: ["Penghu","Green Island","Orchid Island","Kinmen (Quemoy)"], ans: 3, fun: "Kinmen is just a few kilometers from the Chinese city of Xiamen and was the site of the famous 1958 artillery crisis." },
  { cat: "Geography", q: "What is the approximate area of Taiwan?", opts: ["16,000 km²","36,000 km²","56,000 km²","76,000 km²"], ans: 1, fun: "At ~36,000 km², Taiwan is slightly larger than the Netherlands but packs in towering mountains, tropical coasts, and dense cities." },

  // FOOD & DRINK
  { cat: "Food & Drink", q: "Which famous night-market snack is a sausage wrapped inside a sticky rice sausage?", opts: ["Oyster omelette","Scallion pancake","Big sausage small sausage","Pork blood cake"], ans: 2, fun: "Called 大腸包小腸 (dà cháng bāo xiǎo cháng), it's a beloved street food at night markets across Taiwan." },
  { cat: "Food & Drink", q: "What soft drink was invented in Taiwan and became hugely popular worldwide?", opts: ["Barley tea","Bubble tea (boba)","Grass jelly drink","Sugarcane juice"], ans: 1, fun: "Bubble tea — milk tea with chewy tapioca pearls — was invented in Taichung in the 1980s and is now a global phenomenon." },
  { cat: "Food & Drink", q: "Beef noodle soup is considered a Taiwanese national dish. Which city is especially famous for its annual Beef Noodle Festival?", opts: ["Kaohsiung","Tainan","Taipei","Hualien"], ans: 2, fun: "Taipei hosts a major International Beef Noodle Festival each year, drawing vendors and enthusiasts from across the country." },
  { cat: "Food & Drink", q: "What is 'ba-wan' (肉圓), a popular Taiwanese street food?", opts: ["Deep-fried tofu","A gelatinous dumpling with a savory filling","Grilled corn with mayonnaise","Sweet sticky rice ball"], ans: 1, fun: "Ba-wan is a chewy, semi-transparent dumpling made from sweet potato starch, stuffed with pork and bamboo shoots, then steamed or fried." },
  { cat: "Food & Drink", q: "Taiwan is famous for which type of tea, grown in high-altitude mountain areas?", opts: ["Pu-erh","Sencha","Oolong","Darjeeling"], ans: 2, fun: "Alishan and Li Shan oolong teas are among the most prized in the world, grown at altitudes above 1,000 metres." },
  { cat: "Food & Drink", q: "Which Taipei night market is the most famous and a must-visit for foodies?", opts: ["Ruifeng Night Market","Liuhe Night Market","Shilin Night Market","Fengjia Night Market"], ans: 2, fun: "Shilin Night Market in Taipei is one of the largest and most visited night markets in Taiwan, famous for its huge variety of street foods." },

let gameQuestions = [];
let currentQ = 0;
let scores = [0, 0];
let names = ["Player 1", "Player 2"];
let totalQ = 20;
let answered = false;
let currentTurn = 0; // alternates
let selectedQCount = 20;

// Setup
document.querySelectorAll('.q-opt').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.q-opt').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    selectedQCount = parseInt(this.dataset.val);
  });
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  const n1 = document.getElementById('p1name').value.trim() || 'Player 1';
  const n2 = document.getElementById('p2name').value.trim() || 'Player 2';
  names = [n1, n2];
  scores = [0, 0];
  totalQ = selectedQCount;
  currentTurn = 0;

  gameQuestions = shuffle(ALL_QUESTIONS).slice(0, totalQ);
  currentQ = 0;

  document.getElementById('p1label').textContent = n1;
  document.getElementById('p2label').textContent = n2;
  document.getElementById('p1score').textContent = '0';
  document.getElementById('p2score').textContent = '0';

  showScreen('gameScreen');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  answered = false;
  const q = gameQuestions[currentQ];
  const turn = currentQ % 2; // alternates each question
  currentTurn = turn;

  // Update counters
  document.getElementById('qcounter').textContent = `Q ${currentQ + 1} / ${totalQ}`;
  document.getElementById('progressFill').style.width = `${(currentQ / totalQ) * 100}%`;

  // Turn label
  const tl = document.getElementById('turnLabel');
  tl.textContent = `🙋 ${names[turn]}'s turn`;
  tl.className = `turn-label ${turn === 0 ? 'p1' : 'p2'}`;

  // Active card highlight
  document.getElementById('p1card').classList.toggle('active-turn', turn === 0);
  document.getElementById('p2card').classList.toggle('active-turn', turn === 1);

  document.getElementById('categoryTag').textContent = q.cat.toUpperCase();
  document.getElementById('questionText').textContent = q.q;

  const letters = ['A', 'B', 'C', 'D'];
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => handleAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedbackBar').className = 'feedback-bar';
  document.getElementById('feedbackBar').innerHTML = '';
  document.getElementById('nextBtn').className = 'next-btn';
}

function handleAnswer(chosen) {
  if (answered) return;
  answered = true;

  const q = gameQuestions[currentQ];
  const btns = document.querySelectorAll('.option-btn');
  const fb = document.getElementById('feedbackBar');
  const correct = chosen === q.ans;

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen && !correct) btn.classList.add('wrong');
  });

  if (correct) {
    scores[currentTurn]++;
    const scoreEl = document.getElementById(currentTurn === 0 ? 'p1score' : 'p2score');
    scoreEl.textContent = scores[currentTurn];
    scoreEl.classList.remove('score-bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('score-bump');

    fb.className = 'feedback-bar correct-fb show';
    fb.innerHTML = `<strong>✅ Correct!</strong> +1 point for ${names[currentTurn]}<div class="feedback-fun">${q.fun}</div>`;
  } else {
    fb.className = 'feedback-bar wrong-fb show';
    const correctText = q.opts[q.ans];
    fb.innerHTML = `<strong>❌ Not quite!</strong> The answer was <strong>${correctText}</strong><div class="feedback-fun">${q.fun}</div>`;
  }

  document.getElementById('nextBtn').className = 'next-btn show';
  if (currentQ + 1 >= totalQ) {
    document.getElementById('nextBtn').textContent = 'See Results 🏆';
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= totalQ) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  showScreen('resultsScreen');
  document.getElementById('fp1name').textContent = names[0];
  document.getElementById('fp2name').textContent = names[1];
  document.getElementById('fp1score').textContent = scores[0];
  document.getElementById('fp2score').textContent = scores[1];

  let emoji, title, sub;
  if (scores[0] > scores[1]) {
    emoji = '🥇'; title = `${names[0]} wins!`;
    sub = `${names[0]} takes the trophy with ${scores[0]} out of ${totalQ} correct.`;
    document.getElementById('finalP1Card').classList.add('winner');
    document.getElementById('finalP2Card').classList.remove('winner');
  } else if (scores[1] > scores[0]) {
    emoji = '🥇'; title = `${names[1]} wins!`;
    sub = `${names[1]} takes the trophy with ${scores[1]} out of ${totalQ} correct.`;
    document.getElementById('finalP2Card').classList.add('winner');
    document.getElementById('finalP1Card').classList.remove('winner');
  } else {
    emoji = '🤝'; title = "It's a tie!";
    sub = `Both players scored ${scores[0]} out of ${totalQ}. Perfect rivals for Taiwan!`;
    document.getElementById('finalP1Card').classList.remove('winner');
    document.getElementById('finalP2Card').classList.remove('winner');
  }

  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSub').textContent = sub;
}

function playAgain() {
  scores = [0, 0];
  currentQ = 0;
  gameQuestions = shuffle(ALL_QUESTIONS).slice(0, totalQ);
  document.getElementById('p1score').textContent = '0';
  document.getElementById('p2score').textContent = '0';
  document.getElementById('finalP1Card').classList.remove('winner');
  document.getElementById('finalP2Card').classList.remove('winner');
  showScreen('gameScreen');
  renderQuestion();
}

function newGame() {
  showScreen('setupScreen');
}
</script>
